name: Validate Plugin Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PLUGIN_SLUG: wordpress-ai-assistant

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint PHP sources
        run: |
          find . -type f -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Build distributable ZIP
        run: |
          mkdir -p "dist/${PLUGIN_SLUG}"
          rsync -a --delete \
            --exclude-from='.distignore' \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='*.md' \
            ./ "dist/${PLUGIN_SLUG}/"
          (
            cd dist
            zip -qr "../${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          )
          unzip -t "${PLUGIN_SLUG}.zip"

      - name: Validate local CDN manifest
        run: jq empty plugin-info.json
