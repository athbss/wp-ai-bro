name: Publish to AT Private CDN

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  PLUGIN_SLUG: wordpress-ai-assistant
  PLUGIN_FILE: wordpress-ai-assistant/wordpress-ai-assistant.php
  CDN_URL: https://updates.amiteam.io
  CDN_REPOSITORY: amit-trabelsi-digital/wp-plugins-cdn

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out plugin source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          PLUGIN_VERSION=$(grep -m 1 "Version:" "${PLUGIN_SLUG}.php" | awk -F': ' '{print $2}' | tr -d '\r')

          test "$VERSION" = "$PLUGIN_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        run: |
          mkdir -p "dist/${PLUGIN_SLUG}"
          rsync -a --delete \
            --exclude-from='.distignore' \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='*.md' \
            ./ "dist/${PLUGIN_SLUG}/"
          (
            cd dist
            zip -qr "../${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          )

      - name: Generate CDN manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > plugin-info.json <<EOF
          {
            "schema_version": 1,
            "name": "WordPress AI Assistant",
            "slug": "${PLUGIN_SLUG}",
            "plugin_file": "${PLUGIN_FILE}",
            "version": "${VERSION}",
            "author": "Amit Trabelsi",
            "author_profile": "https://amit-trabelsi.co.il",
            "homepage": "https://github.com/${GITHUB_REPOSITORY}",
            "requires": "5.8",
            "tested": "6.8",
            "requires_php": "7.4",
            "last_updated": "$(date -u +'%Y-%m-%d %H:%M:%S')",
            "package": "${CDN_URL}/${PLUGIN_SLUG}/download",
            "download_url": "${CDN_URL}/${PLUGIN_SLUG}/download",
            "sections": {
              "description": "תוסף WordPress מתקדם המספק יכולות בינה מלאכותית לשיפור תהליכי יצירת תוכן, נגישות וחוויית המשתמש.",
              "changelog": "<h4>${VERSION}</h4><p>ראה את רשימת השינויים המלאה ב-GitHub.</p>"
            },
            "banners": { "low": "", "high": "" },
            "icons": { "1x": "", "2x": "" }
          }
          EOF
          jq empty plugin-info.json

      - name: Create GitHub release backup
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.PLUGIN_SLUG }}.zip
            plugin-info.json
          generate_release_notes: true

      - name: Check out CDN distribution repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CDN_REPOSITORY }}
          token: ${{ secrets.AT_CDN_REPO_TOKEN }}
          path: cdn

      - name: Publish package and manifest to CDN
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p "cdn/public/${PLUGIN_SLUG}"
          cp "${PLUGIN_SLUG}.zip" "cdn/public/${PLUGIN_SLUG}/${PLUGIN_SLUG}.zip"
          cp plugin-info.json "cdn/public/${PLUGIN_SLUG}/plugin-info.json"
          (
            cd cdn
            git config user.name "AT Plugin Publisher"
            git config user.email "actions@users.noreply.github.com"
            git add "public/${PLUGIN_SLUG}/${PLUGIN_SLUG}.zip" "public/${PLUGIN_SLUG}/plugin-info.json"
            git commit -m "publish(${PLUGIN_SLUG}): v${VERSION}"
            git push origin main
          )

      - name: Verify public CDN release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in $(seq 1 12); do
            MANIFEST=$(curl --fail --silent --show-error "${CDN_URL}/${PLUGIN_SLUG}/plugin-info.json" || true)
            if echo "$MANIFEST" | jq -e --arg version "$VERSION" '.version == $version' >/dev/null; then
              curl --fail --silent --show-error --head "${CDN_URL}/${PLUGIN_SLUG}/download"
              exit 0
            fi
            sleep 10
          done
          echo "CDN did not publish version ${VERSION} in time" >&2
          exit 1
